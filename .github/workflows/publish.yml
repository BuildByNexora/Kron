name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish wheels
    runs-on: ${{ matrix.os }}
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U maturin twine
      - run: maturin build --release
      - run: twine check target/wheels/*
      - run: maturin publish --skip-existing
