name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test
        if: runner.os != 'Windows'
      - run: cargo test --workspace --lib
        if: runner.os == 'Windows'

  python:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create virtualenv
        run: python -m venv .venv
      - name: Install Python build tools
        run: .venv/bin/python -m pip install -U pip maturin pytest
        if: runner.os != 'Windows'
      - name: Install Python build tools
        run: .venv\Scripts\python -m pip install -U pip maturin pytest
        if: runner.os == 'Windows'
      - name: Install Kron into virtualenv
        run: .venv/bin/maturin develop
        if: runner.os != 'Windows'
      - name: Install Kron into virtualenv
        run: .venv\Scripts\maturin develop
        if: runner.os == 'Windows'
      - name: Run Python tests
        run: .venv/bin/python -m pytest -q tests/python
        if: runner.os != 'Windows'
      - name: Run Python tests
        run: .venv\Scripts\python -m pytest -q tests/python/test_kron_api.py tests/python/test_async_api.py
        if: runner.os == 'Windows'

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -U maturin twine
      - run: maturin build --release
      - run: twine check target/wheels/*
      - run: |
          bash scripts/check-wheel-install.sh
        if: runner.os != 'Windows'
      - run: |
          python -m venv wheel-test
          $wheel = (Get-ChildItem target\wheels\*.whl | Select-Object -First 1).FullName
          wheel-test\Scripts\pip install $wheel
          wheel-test\Scripts\python -c "import kron; print(kron)"
        if: runner.os == 'Windows'
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*
